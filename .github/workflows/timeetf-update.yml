name: Update TIME ETF Report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/timeetf-update.yml"
      - "tools/timeetf/**"
  schedule:
    - cron: "20 22 * * *"

permissions:
  contents: write

concurrency:
  group: timeetf-update
  cancel-in-progress: true

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas beautifulsoup4 lxml

      - name: Build dataset
        shell: bash
        run: |
          TODAY_KST="$(TZ=Asia/Seoul date +%F)"
          python tools/timeetf/build_dataset.py \
            --idx 24 \
            --start-date 2026-03-01 \
            --end-date "$TODAY_KST" \
            --output-dir timeetf/data

      - name: Build static report
        run: |
          python tools/timeetf/build_static_report.py \
            --dataset-dir timeetf/data \
            --output timeetf/index.html

      - name: Commit updated report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore \
            timeetf/index.html \
            timeetf/data/catalog.json \
            timeetf/data/dataset_meta.json \
            timeetf/data/holdings_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update TIME ETF report"
          git push
