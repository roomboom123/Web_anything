<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>준비물 보드 | 멀티 탭 체크리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#f5efe4;
      --panel:#fffdf9;
      --ink:#273133;
      --muted:#6c7774;
      --line:#dccfbb;
      --line-strong:#cab79f;
      --accent:#236b61;
      --accent-strong:#194f48;
      --accent-soft:#dfeee8;
      --warm:#ba6d34;
      --warm-soft:#f6e5d5;
      --danger-soft:#f9e0db;
      --shadow:0 22px 52px rgba(95, 78, 53, .12);
      --radius-xl:32px;
      --radius-lg:28px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      font-family:"IBM Plex Sans KR","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(35,107,97,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(186,109,52,.14), transparent 24%),
        linear-gradient(180deg, #f7f1e6 0%, #f5efe4 40%, #f8f5ef 100%);
    }

    button,input,select{font:inherit}

    button{
      border:1px solid var(--line-strong);
      background:var(--panel);
      color:var(--ink);
      border-radius:999px;
      padding:13px 18px;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 22px rgba(78, 66, 49, .12);
      border-color:#b99f7f;
    }

    button.accent{background:var(--accent);color:#fff;border-color:transparent}
    button.warm{background:var(--warm-soft);color:#6e3f1f;border-color:#dfb48d}
    button.danger{background:var(--danger-soft);color:#80352d;border-color:#e3a59e}
    button[hidden]{display:none !important}

    .page{
      max-width:1340px;
      margin:0 auto;
      padding:24px 16px 72px;
    }

    .hero{
      background:linear-gradient(160deg, rgba(255,255,255,.88), rgba(251,245,236,.92));
      border:1px solid rgba(202,183,159,.86);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:24px;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:auto -80px -120px auto;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(35,107,97,.12), transparent 72%);
      pointer-events:none;
    }

    .hero__top,.panel__header{
      display:flex;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }

    .eyebrow,.panel__eyebrow,.metric__label{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:700;
    }

    .sync-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(35,107,97,.24);
      background:var(--accent-soft);
      color:var(--accent-strong);
      font-size:13px;
      font-weight:600;
    }

    .sync-pill.offline{
      background:var(--danger-soft);
      color:#7d3c33;
      border-color:rgba(162,72,63,.26);
    }

    .sync-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:currentColor;
      flex:0 0 auto;
    }

    .hero__grid{
      display:grid;
      grid-template-columns:minmax(0, 1.7fr) minmax(280px, 1fr);
      gap:18px;
      margin-top:18px;
    }

    .hero__copy h1,.panel__title,.metric strong{
      margin:0;
      font-family:"Noto Serif KR",serif;
      line-height:1.18;
      letter-spacing:-.03em;
    }

    .hero__copy h1{font-size:clamp(2rem, 5vw, 3.3rem)}
    .panel__title{font-size:1.55rem}
    .metric strong{font-size:2rem}

    .hero__copy p,.panel__subtitle,.metric span,.summary-tile span,.item-note,.helper,.empty-state,.tab-button__meta{
      color:var(--muted);
      line-height:1.7;
    }

    .hero__copy p{margin:12px 0 0;font-size:15px;max-width:58ch}

    .chip-row,.tag-row,.hero__actions,.modal-actions,.item-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .chip,.tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid rgba(202,183,159,.82);
      background:rgba(255,255,255,.74);
      color:var(--muted);
    }

    .tag.accent{color:var(--accent-strong);background:var(--accent-soft);border-color:rgba(35,107,97,.22)}
    .tag.warm{color:#77431c;background:var(--warm-soft);border-color:rgba(186,109,52,.22)}

    .hero__metrics{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .metric,.summary-tile,.progress-chip{
      border:1px solid rgba(202,183,159,.78);
      background:rgba(255,255,255,.74);
    }

    .metric{
      min-height:142px;
      padding:18px 16px;
      border-radius:24px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:12px;
    }

    .hero__actions{margin-top:20px;gap:10px}

    .tabs-wrap{
      margin-top:16px;
      position:sticky;
      top:12px;
      z-index:20;
      padding:10px;
      border-radius:24px;
      border:1px solid rgba(202,183,159,.74);
      background:rgba(247,241,231,.82);
      backdrop-filter:blur(16px);
      box-shadow:0 10px 26px rgba(101, 83, 58, .08);
    }

    .tabs{
      display:flex;
      gap:10px;
      overflow-x:auto;
      scrollbar-width:none;
    }

    .tabs::-webkit-scrollbar{display:none}

    .tab-button{
      min-width:max-content;
      padding:12px 16px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:3px;
      border-radius:22px;
      background:rgba(255,255,255,.78);
    }

    .tab-button.is-active{
      background:var(--ink);
      color:#fff;
      border-color:transparent;
      box-shadow:0 12px 24px rgba(39,49,51,.22);
    }

    .tab-button.is-active .tab-button__meta{color:rgba(255,255,255,.72)}
    .tab-button--add{justify-content:center;align-items:center;padding-inline:20px;border-style:dashed;color:var(--accent-strong)}
    .tab-button__label{font-size:15px;font-weight:700;line-height:1.2}
    .tab-button__meta{font-size:12px}

    .board-shell{margin-top:20px}
    .board{display:grid;grid-template-columns:repeat(auto-fit, minmax(285px, 1fr));gap:14px;align-items:start}
    .full-span{grid-column:1 / -1}

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(254,250,244,.94));
      border:1px solid rgba(202,183,159,.84);
      border-radius:var(--radius-lg);
      padding:18px 17px;
      box-shadow:var(--shadow);
      min-width:0;
    }

    .panel--summary{
      display:grid;
      grid-template-columns:minmax(0, 1.15fr) minmax(270px, .95fr);
      gap:18px;
      background:
        radial-gradient(circle at top right, rgba(35,107,97,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,251,245,.98), rgba(250,244,235,.96));
    }

    .panel__subtitle{margin:7px 0 0;font-size:13px}
    .tag-row{margin-top:10px}

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
      gap:10px;
      align-self:start;
    }

    .summary-tile{
      padding:12px;
      border-radius:20px;
    }

    .summary-tile strong,.item-name{
      display:block;
      font-size:15px;
      font-weight:700;
    }

    .summary-tile span,.metric span,.item-note,.helper,.empty-state{font-size:13px}

    .progress-chip{
      min-width:132px;
      padding:10px 11px;
      border-radius:16px;
      flex:0 0 auto;
    }

    .progress-chip strong{display:block;font-size:15px;line-height:1.2}
    .progress-chip span{display:block;margin-top:4px;font-size:12px}

    .progress-bar{
      margin-top:6px;
      height:7px;
      border-radius:999px;
      background:rgba(205,190,167,.36);
      overflow:hidden;
    }

    .progress-bar i{
      display:block;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg, var(--accent), var(--warm));
      width:0;
    }

    .helper{margin:12px 0 0}

    .add-grid{
      display:grid;
      grid-template-columns:minmax(0, 1.4fr) minmax(0, 1.2fr) minmax(0, 1fr) auto;
      gap:12px;
      align-items:end;
    }

    .field label{
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .field input,.field select{
      width:100%;
      padding:14px;
      border-radius:18px;
      border:1px solid rgba(202,183,159,.92);
      background:#fff;
      color:var(--ink);
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
    }

    .field input:focus,.field select:focus{
      border-color:#9e8870;
      box-shadow:0 0 0 4px rgba(35,107,97,.08);
    }

    .list{
      list-style:none;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:7px;
    }

    .list--checklist{
      display:grid;
      grid-template-columns:1fr;
      gap:7px;
    }

    .list-item{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:10px 10px;
      border-radius:15px;
      border:1px solid rgba(210,194,170,.74);
      background:rgba(255,250,243,.82);
    }

    .list-item input[type="checkbox"]{
      width:18px;
      height:18px;
      margin-top:1px;
      accent-color:var(--accent);
      flex:0 0 auto;
      cursor:pointer;
    }

    .item-copy{flex:1 1 auto;min-width:0}
    .item-name{font-size:14px;line-height:1.35}
    .item-note{margin-top:2px;font-size:12px;line-height:1.4}
    .item-actions{justify-content:flex-end;flex:0 0 auto}

    .mini-btn{
      padding:6px 10px;
      font-size:11px;
      font-weight:700;
    }

    .mini-btn.warm{background:var(--warm-soft);border-color:#dfb48d;color:#77431c}
    .mini-btn.danger{background:var(--danger-soft);border-color:#e3a59e;color:#80352d}

    .section-block + .section-block{
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed rgba(202,183,159,.92);
    }

    .section-title{
      margin:0 0 7px;
      font-size:13px;
      color:#465250;
      font-weight:700;
    }

    .empty-state{
      padding:18px;
      border-radius:20px;
      border:1px dashed rgba(202,183,159,.98);
      background:rgba(250,244,235,.74);
      line-height:1.7;
    }

    .empty-state strong{display:block;color:var(--ink);margin-bottom:6px}

    .modal-backdrop{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(31, 36, 38, .48);
      z-index:60;
    }

    .modal-backdrop.show{display:flex}

    .modal{
      width:min(100%, 500px);
      background:linear-gradient(180deg, #fffdf9, #f8f1e8);
      border:1px solid rgba(202,183,159,.9);
      border-radius:30px;
      box-shadow:0 28px 70px rgba(43, 34, 24, .24);
      padding:24px;
    }

    .modal h3{
      margin:0;
      font-family:"Noto Serif KR",serif;
      font-size:1.6rem;
      line-height:1.25;
      letter-spacing:-.03em;
    }

    .modal p{margin:10px 0 0;color:var(--muted);font-size:14px;line-height:1.7}
    .modal .field + .field{margin-top:12px}
    .modal-actions{margin-top:18px;gap:10px}
    .modal-actions button{flex:1 1 140px}

    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      background:#273133;
      color:#fff;
      padding:14px 18px;
      border-radius:999px;
      font-size:13px;
      box-shadow:0 16px 32px rgba(27, 31, 32, .24);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      z-index:70;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    @media (max-width: 980px){
      .hero__grid,.panel--summary{grid-template-columns:1fr}
    }

    @media (max-width: 760px){
      .page{padding:16px 12px 56px}
      .hero,.panel{padding:16px 14px;border-radius:24px}
      .hero__metrics,.add-grid{grid-template-columns:1fr}
      .hero__actions button{flex:1 1 calc(50% - 10px)}
      .item-actions{width:100%;justify-content:flex-start;margin-top:10px}
      .list-item{flex-wrap:wrap}
    }

    @media (min-width: 900px){
      .panel.full-span .list--checklist{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px){
      .hero__actions button{flex:1 1 100%}
      .tabs-wrap{top:8px}
      .tab-button{padding:12px 14px}
      .metric{min-height:auto}
    }

    @media print{
      body{background:#fff}
      .page{max-width:none;padding:0}
      .hero,.panel{box-shadow:none;border-color:#d8d8d8;background:#fff}
      .tabs-wrap,.hero__actions,.sync-pill,.toast,.modal-backdrop{display:none !important}
      .board{gap:12px}
      .panel{break-inside:avoid}
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero__top">
        <span class="eyebrow">Shared Packing Board</span>
        <span class="sync-pill" id="syncStatus"><span class="sync-dot"></span> 연결 확인 중</span>
      </div>
      <div class="hero__grid">
        <div class="hero__copy">
          <h1 id="heroTitle">제주 체크리스트</h1>
          <p id="heroSubtitle">비행기 + 렌터카 + 호텔 / 보호자 2인 기준으로 정리한 준비물 목록입니다.</p>
          <div class="chip-row" id="heroChips"></div>
        </div>
        <div class="hero__metrics">
          <div class="metric">
            <span class="metric__label">현재 탭 진행률</span>
            <strong id="overallPct">0%</strong>
            <span id="overallHint">0 / 0 완료</span>
          </div>
          <div class="metric">
            <span class="metric__label">총 항목 수</span>
            <strong id="itemCount">0</strong>
            <span id="itemHint">기본 항목과 직접 추가한 준비물을 함께 셉니다.</span>
          </div>
        </div>
      </div>
      <div class="hero__actions">
        <button type="button" data-action="check-all-true">현재 탭 전체 체크</button>
        <button type="button" data-action="check-all-false">현재 탭 전체 해제</button>
        <button type="button" class="warm" data-action="print">인쇄</button>
        <button type="button" data-action="open-tab-edit" id="editTabButton" hidden>현재 탭 이름 변경</button>
      </div>
    </header>

    <section class="tabs-wrap">
      <div class="tabs" id="tabBar"></div>
    </section>

    <main class="board-shell">
      <section class="board" id="board"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="itemModal">
    <div class="modal">
      <h3>항목 수정</h3>
      <p>이름, 메모, 분류를 바꿀 수 있습니다.</p>
      <div class="field">
        <label for="edit_item_name">이름</label>
        <input type="text" id="edit_item_name" />
      </div>
      <div class="field">
        <label for="edit_item_note">메모</label>
        <input type="text" id="edit_item_note" />
      </div>
      <div class="field">
        <label for="edit_item_category">분류</label>
        <select id="edit_item_category"></select>
      </div>
      <input type="hidden" id="edit_item_id" />
      <div class="modal-actions">
        <button type="button" data-action="close-item-modal">취소</button>
        <button type="button" class="accent" data-action="save-item-edit">저장</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="tabModal">
    <div class="modal">
      <h3 id="tabModalTitle">새 탭 만들기</h3>
      <p id="tabModalSubtitle">새로운 준비물 보드를 만들고 다른 목록을 따로 정리할 수 있어요.</p>
      <div class="field">
        <label for="tab_name">탭 이름</label>
        <input type="text" id="tab_name" placeholder="예: 부산 주말여행, 병원 준비물" />
      </div>
      <div class="field">
        <label for="tab_template">템플릿</label>
        <select id="tab_template"></select>
      </div>
      <input type="hidden" id="tab_id" />
      <div class="modal-actions">
        <button type="button" data-action="close-tab-modal">취소</button>
        <button type="button" class="danger" data-action="delete-tab" id="deleteTabButton" hidden>탭 삭제</button>
        <button type="button" class="accent" data-action="save-tab">저장</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">저장했어요</div>

    function normalizeUserTabs(raw) {
      if (!raw || typeof raw !== "object") return [];
      return Object.entries(raw).map(([id, value]) => Object.assign({ id }, value || {})).filter(tab => tab.id && TEMPLATES[tab.templateId]).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    }

    function normalizeCustomItems(raw) {
      const items = Array.isArray(raw) ? raw : raw && typeof raw === "object" ? Object.values(raw) : [];
      return items.filter(item => item && item.id && item.category && item.name);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
    }

    function createId(prefix) {
      return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function guardOnline(message) {
      if (state.isOnline) return true;
      showToast(message || "오프라인 상태에서는 저장할 수 없어요.");
      return false;
    }

    function setSyncStatus(online) {
      state.isOnline = online;
      const el = document.getElementById("syncStatus");
      el.classList.toggle("offline", !online);
      el.innerHTML = online ? '<span class="sync-dot"></span> 실시간 동기화 중' : '<span class="sync-dot"></span> 오프라인';
    }

    function getBuiltInProgress(card, data) {
      let total = 0;
      let done = 0;
      card.sections.forEach(section => {
        section.items.forEach(item => {
          total += 1;
          if (data.checks[item.key]) done += 1;
        });
      });
      return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
    }

    function getCustomProgress(categoryId, data) {
      const items = data.customItems.filter(item => item.category === categoryId);
      const total = items.length;
      const done = items.filter(item => item.checked).length;
      return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
    }

    function getOverallProgress(template, data) {
      let total = data.customItems.length;
      let done = data.customItems.filter(item => item.checked).length;
      template.cards.forEach(card => {
        const progress = getBuiltInProgress(card, data);
        total += progress.total;
        done += progress.done;
      });
      return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
    }

    function resetDraft(forceClear) {
      const ids = getTemplate().customCategories.map(category => category.id);
      if (forceClear) {
        state.draft.addName = "";
        state.draft.addNote = "";
      }
      if (!ids.includes(state.draft.addCategory)) state.draft.addCategory = ids[0] || "";
    }

    function renderProgressChip(progress) {
      const percentText = progress.total ? progress.pct + "%" : "준비 전";
      const helperText = progress.total ? progress.done + " / " + progress.total + " 완료" : "항목을 채워보세요";
      return '<div class="progress-chip"><strong>' + escapeHtml(percentText) + '</strong><span>' + escapeHtml(helperText) + '</span><div class="progress-bar"><i style="width:' + (progress.total ? progress.pct : 0) + '%"></i></div></div>';
    }

    function renderTagRow(tags) {
      return !tags || !tags.length ? "" : '<div class="tag-row">' + tags.map(tag => '<span class="tag ' + escapeHtml(tag.tone || "") + '">' + escapeHtml(tag.label) + '</span>').join("") + "</div>";
    }

    function renderHero() {
      const tab = getTab();
      const template = getTemplate(tab);
      const progress = getOverallProgress(template, ensureTabData(tab.id));
      document.getElementById("heroTitle").textContent = tab.name;
      document.getElementById("heroSubtitle").textContent = template.description;
      document.getElementById("overallPct").textContent = progress.pct + "%";
      document.getElementById("overallHint").textContent = progress.done + " / " + progress.total + " 완료";
      document.getElementById("itemCount").textContent = String(progress.total);
      document.getElementById("itemHint").textContent = progress.total ? "기본 항목과 직접 추가한 준비물을 함께 셉니다." : "아직 항목이 없어요. 직접 추가해서 시작할 수 있어요.";
      document.getElementById("editTabButton").hidden = tab.id === DEFAULT_TAB.id;
      document.getElementById("heroChips").innerHTML = '<span class="chip">' + escapeHtml(template.name) + '</span><span class="chip">' + escapeHtml(tab.id === DEFAULT_TAB.id ? "기본 탭" : "사용자 탭") + '</span><span class="chip">직접 추가 분류 ' + template.customCategories.length + '개</span>';
    }

    function renderTabs() {
      document.getElementById("tabBar").innerHTML = getAllTabs().map(tab => {
        const activeClass = tab.id === state.activeTabId ? " is-active" : "";
        return '<button type="button" class="tab-button' + activeClass + '" data-action="select-tab" data-tab-id="' + escapeHtml(tab.id) + '"><span class="tab-button__label">' + escapeHtml(tab.name) + '</span><span class="tab-button__meta">' + escapeHtml(getTemplate(tab).name) + '</span></button>';
      }).join("") + '<button type="button" class="tab-button tab-button--add" data-action="open-tab-create">+ 새 탭</button>';
    }

    function renderSummaryPanel(template) {
      const tab = getTab();
      return '<section class="panel panel--summary full-span"><div><span class="panel__eyebrow">Current Board</span><h2 class="panel__title">' + escapeHtml(tab.name) + '</h2><p class="panel__subtitle">' + escapeHtml(template.blurb) + '</p>' + renderTagRow([{ tone: "accent", label: template.name }, { tone: "warm", label: tab.id === DEFAULT_TAB.id ? "기존 제주 데이터 유지" : "새 경로로 저장" }]) + '</div><div class="summary-grid">' + template.customCategories.map(category => '<div class="summary-tile"><strong>' + escapeHtml(category.shortLabel) + '</strong><span>' + escapeHtml(category.hint) + '</span></div>').join("") + '</div></section>';
    }

    function renderComposerPanel(template) {
      const currentCategory = state.draft.addCategory || (template.customCategories[0] ? template.customCategories[0].id : "");
      const options = template.customCategories.map(category => '<option value="' + escapeHtml(category.id) + '"' + (category.id === currentCategory ? " selected" : "") + '>' + escapeHtml(category.label) + '</option>').join("");
      return '<section class="panel full-span"><div class="panel__header"><div><span class="panel__eyebrow">Quick Add</span><h2 class="panel__title">준비물 직접 추가</h2><p class="panel__subtitle">현재 탭에 필요한 항목을 바로 적어 넣고, 아래 분류 카드에서 따로 관리할 수 있어요.</p></div>' + renderProgressChip({ done: 0, total: 0, pct: 0 }) + '</div><div class="add-grid"><div class="field"><label for="add_name">준비물 이름</label><input type="text" id="add_name" placeholder="예: 구급 파우치, 여벌 배터리" value="' + escapeHtml(state.draft.addName) + '" /></div><div class="field"><label for="add_note">메모</label><input type="text" id="add_note" placeholder="예: 차 트렁크에 넣기" value="' + escapeHtml(state.draft.addNote) + '" /></div><div class="field"><label for="add_category">분류</label><select id="add_category">' + options + '</select></div><div class="field"><label>&nbsp;</label><button type="button" class="accent" data-action="add-custom-item">추가</button></div></div><p class="helper">체크 상태와 추가 항목은 실시간으로 동기화됩니다. 제주 기본 탭은 기존 데이터와 그대로 연결되고, 새 탭은 별도 목록으로 저장됩니다.</p></section>';
    }

    function renderCustomCategoryPanel(category, data) {
      const progress = getCustomProgress(category.id, data);
      const items = data.customItems.filter(item => item.category === category.id);
      const content = items.length
        ? '<ul class="list">' + items.map(item => '<li class="list-item"><input type="checkbox" data-role="custom-checkbox" data-custom-id="' + escapeHtml(item.id) + '"' + (item.checked ? " checked" : "") + ' /><div class="item-copy"><div class="item-name">' + escapeHtml(item.name) + '</div>' + (item.note ? '<div class="item-note">' + escapeHtml(item.note) + '</div>' : "") + '</div><div class="item-actions"><button type="button" class="mini-btn warm" data-action="edit-custom-item" data-custom-id="' + escapeHtml(item.id) + '">수정</button><button type="button" class="mini-btn danger" data-action="delete-custom-item" data-custom-id="' + escapeHtml(item.id) + '">삭제</button></div></li>').join("") + '</ul>'
        : '<div class="empty-state"><strong>아직 항목이 없어요.</strong>' + escapeHtml(category.hint) + '</div>';
      return '<section class="panel"><div class="panel__header"><div><span class="panel__eyebrow">Custom</span><h2 class="panel__title">' + escapeHtml(category.label) + '</h2><p class="panel__subtitle">직접 추가한 항목만 따로 모아두는 카드입니다.</p></div>' + renderProgressChip(progress) + '</div>' + content + '</section>';
    }

    function renderBuiltInCard(card, data) {
      const progress = getBuiltInProgress(card, data);
      const sections = card.sections.map(section => '<div class="section-block">' + (section.title ? '<h3 class="section-title">' + escapeHtml(section.title) + '</h3>' : "") + '<ul class="list list--checklist">' + section.items.map(item => '<li class="list-item"><input type="checkbox" data-role="built-in-checkbox" data-item-key="' + escapeHtml(item.key) + '"' + (data.checks[item.key] ? " checked" : "") + ' /><div class="item-copy"><div class="item-name">' + escapeHtml(item.name) + '</div>' + (item.note ? '<div class="item-note">' + escapeHtml(item.note) + '</div>' : "") + '</div></li>').join("") + '</ul></div>').join("");
      return '<section class="panel' + (card.wide ? ' full-span' : '') + '"><div class="panel__header"><div><span class="panel__eyebrow">Built-in</span><h2 class="panel__title">' + escapeHtml(card.title) + '</h2>' + (card.subtitle ? '<p class="panel__subtitle">' + escapeHtml(card.subtitle) + '</p>' : "") + renderTagRow(card.tags) + '</div>' + renderProgressChip(progress) + '</div>' + sections + '</section>';
    }

    function renderBoard() {
      const template = getTemplate();
      const data = ensureTabData(state.activeTabId);
      const builtIns = template.cards.length ? template.cards.map(card => renderBuiltInCard(card, data)).join("") : '<section class="panel full-span"><div class="empty-state"><strong>이 탭은 자유형 체크리스트예요.</strong>위의 직접 추가 영역에서 필요한 준비물을 하나씩 넣어가며 나만의 목록을 만들 수 있어요.</div></section>';
      document.getElementById("board").innerHTML = renderSummaryPanel(template) + renderComposerPanel(template) + template.customCategories.map(category => renderCustomCategoryPanel(category, data)).join("") + builtIns;
    }

    function renderApp() {
      resetDraft(false);
      renderHero();
      renderTabs();
      renderBoard();
    }

    function detachActiveListeners() {
      if (!state.activeListenerCleanup) return;
      state.activeListenerCleanup();
      state.activeListenerCleanup = null;
      state.activeListenerTabId = null;
    }

    function listenToActiveTabData() {
      const tabId = state.activeTabId;
      if (state.activeListenerTabId === tabId) return;
      detachActiveListeners();
      const checksRef = getChecklistRef(tabId);
      const customRef = getCustomRef(tabId);
      const onChecks = snapshot => {
        ensureTabData(tabId).checks = snapshot.val() || {};
        if (state.activeTabId === tabId) renderApp();
      };
      const onCustom = snapshot => {
        ensureTabData(tabId).customItems = normalizeCustomItems(snapshot.val());
        if (state.activeTabId === tabId) renderApp();
      };
      checksRef.on("value", onChecks);
      customRef.on("value", onCustom);
      state.activeListenerTabId = tabId;
      state.activeListenerCleanup = () => {
        checksRef.off("value", onChecks);
        customRef.off("value", onCustom);
      };
    }

    function setActiveTab(tabId) {
      if (!getAllTabs().some(tab => tab.id === tabId)) tabId = DEFAULT_TAB.id;
      state.activeTabId = tabId;
      localStorage.setItem(STORAGE_KEY, tabId);
      resetDraft(true);
      closeItemModal();
      closeTabModal();
      renderApp();
      listenToActiveTabData();
    }

    function listenToTabs() {
      tabsRef.on("value", snapshot => {
        state.userTabs = normalizeUserTabs(snapshot.val());
        if (!getAllTabs().some(tab => tab.id === state.activeTabId)) {
          state.activeTabId = DEFAULT_TAB.id;
          localStorage.setItem(STORAGE_KEY, DEFAULT_TAB.id);
        }
        renderApp();
        listenToActiveTabData();
      });
    }

    function updateDraftFromDom() {
      const name = document.getElementById("add_name");
      const note = document.getElementById("add_note");
      const category = document.getElementById("add_category");
      if (name) state.draft.addName = name.value;
      if (note) state.draft.addNote = note.value;
      if (category) state.draft.addCategory = category.value;
    }

    async function addCustomItem() {
      updateDraftFromDom();
      const template = getTemplate();
      const ids = template.customCategories.map(category => category.id);
      const name = state.draft.addName.trim();
      const note = state.draft.addNote.trim();
      const category = ids.includes(state.draft.addCategory) ? state.draft.addCategory : ids[0];
      if (!name) return showToast("준비물 이름을 적어주세요.");
      if (!guardOnline("오프라인 상태에서는 항목을 추가할 수 없어요.")) return;
      const tabId = state.activeTabId;
      const current = ensureTabData(tabId);
      const nextItems = [{ id: createId("custom"), category, name, note, checked: false }].concat(current.customItems);
      current.customItems = nextItems;
      state.draft.addName = "";
      state.draft.addNote = "";
      renderApp();
      try {
        await getCustomRef(tabId).set(nextItems);
        showToast("항목을 추가했어요.");
      } catch (error) {
        console.error(error);
        showToast("추가 중 문제가 생겼어요.");
      }
    }

    async function updateBuiltInCheck(key, checked) {
      if (!guardOnline("오프라인 상태에서는 체크를 저장할 수 없어요.")) return renderApp();
      const tabId = state.activeTabId;
      const current = ensureTabData(tabId);
      current.checks = Object.assign({}, current.checks, { [key]: checked });
      renderApp();
      try {
        await getChecklistRef(tabId).child(key).set(checked);
      } catch (error) {
        console.error(error);
        showToast("체크 상태 저장에 실패했어요.");
      }
    }

    async function updateCustomCheck(id, checked) {
      if (!guardOnline("오프라인 상태에서는 체크를 저장할 수 없어요.")) return renderApp();
      const current = ensureTabData(state.activeTabId);
      current.customItems = current.customItems.map(item => item.id === id ? Object.assign({}, item, { checked }) : item);
      renderApp();
      try {
        await getCustomRef(state.activeTabId).set(current.customItems);
      } catch (error) {
        console.error(error);
        showToast("체크 상태 저장에 실패했어요.");
      }
    }

    async function checkAll(flag) {
      if (!guardOnline("오프라인 상태에서는 전체 체크를 저장할 수 없어요.")) return;
      const tabId = state.activeTabId;
      const template = getTemplate();
      const current = ensureTabData(tabId);
      const updates = {};
      template.cards.forEach(card => card.sections.forEach(section => section.items.forEach(item => { updates[item.key] = flag; })));
      current.checks = Object.assign({}, current.checks, updates);
      current.customItems = current.customItems.map(item => Object.assign({}, item, { checked: flag }));
      renderApp();
      try {
        const jobs = [];
        if (Object.keys(updates).length) jobs.push(getChecklistRef(tabId).update(updates));
        jobs.push(getCustomRef(tabId).set(current.customItems));
        await Promise.all(jobs);
        showToast(flag ? "현재 탭을 전부 체크했어요." : "현재 탭 체크를 모두 해제했어요.");
      } catch (error) {
        console.error(error);
        showToast("전체 체크 저장 중 문제가 생겼어요.");
      }
    }

    function openItemModal(id) {
      const item = ensureTabData(state.activeTabId).customItems.find(entry => entry.id === id);
      if (!item) return;
      const options = getTemplate().customCategories.map(category => '<option value="' + escapeHtml(category.id) + '"' + (category.id === item.category ? " selected" : "") + '>' + escapeHtml(category.label) + '</option>').join("");
      document.getElementById("edit_item_id").value = item.id;
      document.getElementById("edit_item_name").value = item.name;
      document.getElementById("edit_item_note").value = item.note || "";
      document.getElementById("edit_item_category").innerHTML = options;
      document.getElementById("itemModal").classList.add("show");
    }

    function closeItemModal() {
      document.getElementById("itemModal").classList.remove("show");
    }

    async function saveItemEdit() {
      if (!guardOnline("오프라인 상태에서는 수정 내용을 저장할 수 없어요.")) return;
      const id = document.getElementById("edit_item_id").value;
      const name = document.getElementById("edit_item_name").value.trim();
      const note = document.getElementById("edit_item_note").value.trim();
      const category = document.getElementById("edit_item_category").value;
      if (!name) return showToast("이름을 적어주세요.");
      const current = ensureTabData(state.activeTabId);
      current.customItems = current.customItems.map(item => item.id === id ? Object.assign({}, item, { name, note, category }) : item);
      closeItemModal();
      renderApp();
      try {
        await getCustomRef(state.activeTabId).set(current.customItems);
        showToast("항목을 수정했어요.");
      } catch (error) {
        console.error(error);
        showToast("수정 저장 중 문제가 생겼어요.");
      }
    }

    async function deleteCustomItem(id) {
      if (!guardOnline("오프라인 상태에서는 항목을 삭제할 수 없어요.")) return;
      if (!confirm("이 항목을 삭제할까요?")) return;
      const current = ensureTabData(state.activeTabId);
      current.customItems = current.customItems.filter(item => item.id !== id);
      closeItemModal();
      renderApp();
      try {
        await getCustomRef(state.activeTabId).set(current.customItems);
        showToast("항목을 삭제했어요.");
      } catch (error) {
        console.error(error);
        showToast("삭제 중 문제가 생겼어요.");
      }
    }

    function populateTemplateOptions(selectedId) {
      document.getElementById("tab_template").innerHTML = Object.entries(TEMPLATES).map(([id, template]) => '<option value="' + escapeHtml(id) + '"' + (id === selectedId ? " selected" : "") + '>' + escapeHtml(template.name) + '</option>').join("");
    }

    function openTabCreateModal() {
      document.getElementById("tabModalTitle").textContent = "새 탭 만들기";
      document.getElementById("tabModalSubtitle").textContent = "새로운 준비물 보드를 만들고 다른 목록을 따로 정리할 수 있어요.";
      document.getElementById("tab_id").value = "";
      document.getElementById("tab_name").value = "";
      document.getElementById("deleteTabButton").hidden = true;
      populateTemplateOptions("travel");
      document.getElementById("tab_template").disabled = false;
      document.getElementById("tabModal").classList.add("show");
    }

    function openTabEditModal() {
      const tab = getTab();
      if (tab.id === DEFAULT_TAB.id) return;
      document.getElementById("tabModalTitle").textContent = "현재 탭 수정";
      document.getElementById("tabModalSubtitle").textContent = "탭 이름은 바꿀 수 있고, 삭제하면 이 탭의 체크 상태와 추가 항목도 함께 지워집니다.";
      document.getElementById("tab_id").value = tab.id;
      document.getElementById("tab_name").value = tab.name;
      document.getElementById("deleteTabButton").hidden = false;
      populateTemplateOptions(tab.templateId);
      document.getElementById("tab_template").disabled = true;
      document.getElementById("tabModal").classList.add("show");
    }

    function closeTabModal() {
      document.getElementById("tabModal").classList.remove("show");
    }

    async function saveTab() {
      if (!guardOnline("오프라인 상태에서는 탭을 저장할 수 없어요.")) return;
      const id = document.getElementById("tab_id").value;
      const name = document.getElementById("tab_name").value.trim();
      const templateId = document.getElementById("tab_template").value;
      if (!name) return showToast("탭 이름을 적어주세요.");
      try {
        if (id) {
          await tabsRef.child(id).update({ name });
          showToast("탭 이름을 바꿨어요.");
          closeTabModal();
        } else {
          const newId = createId("tab");
          await Promise.all([
            tabsRef.child(newId).set({ name, templateId, createdAt: Date.now() }),
            db.ref("lists_v2/" + newId).set({ checks: {}, custom: [] })
          ]);
          closeTabModal();
          showToast("새 탭을 만들었어요.");
          setActiveTab(newId);
        }
      } catch (error) {
        console.error(error);
        showToast("탭 저장 중 문제가 생겼어요.");
      }
    }

    async function deleteTab() {
      if (!guardOnline("오프라인 상태에서는 탭을 삭제할 수 없어요.")) return;
      const id = document.getElementById("tab_id").value;
      if (!id || id === DEFAULT_TAB.id) return;
      if (!confirm("이 탭과 이 탭의 체크 상태를 삭제할까요?")) return;
      try {
        if (state.activeTabId === id) setActiveTab(DEFAULT_TAB.id);
        await Promise.all([tabsRef.child(id).remove(), db.ref("lists_v2/" + id).remove()]);
        closeTabModal();
        showToast("탭을 삭제했어요.");
      } catch (error) {
        console.error(error);
        showToast("탭 삭제 중 문제가 생겼어요.");
      }
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.getAttribute("data-action");
      if (action === "select-tab") setActiveTab(target.getAttribute("data-tab-id"));
      if (action === "open-tab-create") openTabCreateModal();
      if (action === "open-tab-edit") openTabEditModal();
      if (action === "close-tab-modal") closeTabModal();
      if (action === "save-tab") saveTab();
      if (action === "delete-tab") deleteTab();
      if (action === "add-custom-item") addCustomItem();
      if (action === "edit-custom-item") openItemModal(target.getAttribute("data-custom-id"));
      if (action === "delete-custom-item") deleteCustomItem(target.getAttribute("data-custom-id"));
      if (action === "close-item-modal") closeItemModal();
      if (action === "save-item-edit") saveItemEdit();
      if (action === "check-all-true") checkAll(true);
      if (action === "check-all-false") checkAll(false);
      if (action === "print") window.print();
    });

    document.addEventListener("input", event => {
      if (event.target.id === "add_name") state.draft.addName = event.target.value;
      if (event.target.id === "add_note") state.draft.addNote = event.target.value;
    });

    document.addEventListener("change", event => {
      if (event.target.id === "add_category") state.draft.addCategory = event.target.value;
      if (event.target.matches('[data-role="built-in-checkbox"]')) updateBuiltInCheck(event.target.getAttribute("data-item-key"), event.target.checked);
      if (event.target.matches('[data-role="custom-checkbox"]')) updateCustomCheck(event.target.getAttribute("data-custom-id"), event.target.checked);
    });

    document.getElementById("itemModal").addEventListener("click", event => {
      if (event.target.id === "itemModal") closeItemModal();
    });

    document.getElementById("tabModal").addEventListener("click", event => {
      if (event.target.id === "tabModal") closeTabModal();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeItemModal();
        closeTabModal();
        return;
      }
      if (event.key !== "Enter") return;
      if (document.getElementById("itemModal").classList.contains("show")) return saveItemEdit();
      if (document.getElementById("tabModal").classList.contains("show")) return saveTab();
      const activeId = document.activeElement && document.activeElement.id;
      if (activeId === "add_name" || activeId === "add_note") addCustomItem();
    });

    db.ref(".info/connected").on("value", snapshot => {
      setSyncStatus(snapshot.val() === true);
    });

    resetDraft(true);
    renderApp();
    listenToTabs();
    listenToActiveTabData();
  </script>
</body>
</html>
