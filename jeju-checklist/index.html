<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Checklist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="topbar">
      <div class="topbar__row">
        <div class="title-block">
          <div class="title-block__eyebrow">Shared travel board</div>
          <h1>Travel Checklist</h1>
        </div>
        <div class="status-cluster">
          <div class="progress-chip">
            <span class="progress-chip__label">Overall</span>
            <strong id="overallDone">0 / 0</strong>
            <span id="overallPct">0%</span>
          </div>
          <div class="sync-badge" id="syncBadge">Loading...</div>
        </div>
      </div>

      <div class="toolbar">
        <label class="search-field">
          <span>Search</span>
          <input type="search" id="searchInput" placeholder="Search items, memo, tag" autocomplete="off" />
        </label>

        <div class="toolbar__actions">
          <label class="toggle-pill">
            <input type="checkbox" id="hideCheckedToggle" />
            <span>Hide checked</span>
          </label>
          <button type="button" class="btn" data-action="expand-all">Expand</button>
          <button type="button" class="btn" data-action="collapse-all">Collapse</button>
          <button type="button" class="btn" data-action="print">Print</button>
          <button type="button" class="btn btn--primary" data-action="new-item">Add item</button>
        </div>
      </div>

      <div class="category-tabs" id="categoryTabs"></div>
    </header>

    <main class="layout">
      <section class="list-pane">
        <div class="list-pane__meta">
          <div>
            <strong id="visibleSummary">0 items</strong>
            <span id="visibleHint">Ready to pack.</span>
          </div>
          <button type="button" class="btn btn--ghost" data-action="clear-search" id="clearSearchButton" hidden>Clear filters</button>
        </div>

        <div class="category-list" id="categoryList"></div>
      </section>

      <aside class="editor-panel" id="editorPanel" aria-hidden="true">
        <div class="editor-panel__header">
          <div>
            <span class="editor-panel__eyebrow">Quick editor</span>
            <h2 id="editorTitle">Add item</h2>
            <p id="editorHint">Create or update one checklist row at a time.</p>
          </div>
          <button type="button" class="icon-btn" data-action="close-editor" aria-label="Close editor">Close</button>
        </div>

        <form class="editor-form" id="itemForm">
          <label class="form-field">
            <span>Category</span>
            <select id="itemCategory" required></select>
          </label>

          <label class="form-field">
            <span>Item name</span>
            <input type="text" id="itemName" maxlength="120" placeholder="Passport, charger, medicine..." required />
          </label>

          <label class="form-field">
            <span>Memo</span>
            <input type="text" id="itemMemo" maxlength="180" placeholder="Optional note" />
          </label>

          <div class="editor-form__grid">
            <label class="form-field">
              <span>Qty</span>
              <input type="text" id="itemQty" maxlength="40" placeholder="1, 2 pairs..." />
            </label>

            <label class="form-field">
              <span>Tag</span>
              <input type="text" id="itemTag" maxlength="40" placeholder="Carry-on" />
            </label>
          </div>

          <label class="check-row">
            <input type="checkbox" id="itemChecked" />
            <span>Mark as packed</span>
          </label>

          <div class="editor-form__actions">
            <button type="button" class="btn btn--danger" data-action="delete-item" id="deleteItemButton" hidden>Delete</button>
            <button type="button" class="btn" data-action="close-editor">Cancel</button>
            <button type="submit" class="btn btn--primary">Save</button>
          </div>
        </form>
      </aside>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
