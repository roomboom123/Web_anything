<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>준비물 체크리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="topbar">
      <div class="topbar__row">
        <div class="title-block">
          <div class="title-block__eyebrow">공유 준비물 보드</div>
          <h1 id="pageTitle">준비물 체크리스트</h1>
        </div>
        <div class="status-cluster">
          <div class="progress-chip">
            <span class="progress-chip__label">Overall</span>
            <strong id="overallDone">0 / 0</strong>
            <span id="overallPct">0%</span>
          </div>
          <div class="sync-badge" id="syncBadge">불러오는 중...</div>
        </div>
      </div>

      <div class="toolbar">
        <label class="search-field">
          <span>검색</span>
          <input type="search" id="searchInput" placeholder="항목명, 메모, 태그 검색" autocomplete="off" />
        </label>

        <div class="toolbar__actions">
          <label class="toggle-pill">
            <input type="checkbox" id="hideCheckedToggle" />
            <span>체크 완료 숨기기</span>
          </label>
          <button type="button" class="btn" data-action="expand-all">전체 펼치기</button>
          <button type="button" class="btn" data-action="collapse-all">전체 접기</button>
          <button type="button" class="btn" data-action="print">인쇄</button>
          <button type="button" class="btn btn--primary" data-action="new-item">항목 추가</button>
        </div>
      </div>

    </header>

    <div class="board-strip">
      <div class="board-tabs" id="boardTabs"></div>
    </div>

    <div class="tabs-strip">
      <div class="category-tabs" id="categoryTabs"></div>
    </div>

    <main class="layout">
      <section class="list-pane">
        <div class="list-pane__meta">
          <div>
            <strong id="visibleSummary">보이는 항목 0개</strong>
            <span id="visibleHint">카테고리 0개 표시 중</span>
          </div>
          <button type="button" class="btn btn--ghost" data-action="clear-search" id="clearSearchButton" hidden>필터 초기화</button>
        </div>

        <div class="category-list" id="categoryList"></div>
      </section>

      <aside class="editor-panel" id="editorPanel" aria-hidden="true">
        <div class="editor-panel__header">
          <div>
            <span class="editor-panel__eyebrow">빠른 편집</span>
            <h2 id="editorTitle">항목 추가</h2>
            <p id="editorHint">항목을 빠르게 추가하거나 수정할 수 있어요.</p>
          </div>
          <button type="button" class="icon-btn" data-action="close-editor" aria-label="편집 닫기">닫기</button>
        </div>

        <form class="editor-form" id="itemForm">
          <label class="form-field">
            <span>카테고리</span>
            <select id="itemCategory" required></select>
          </label>

          <label class="form-field">
            <span>항목 이름</span>
            <input type="text" id="itemName" maxlength="120" placeholder="예: 여벌 옷, 충전기, 상비약" required />
          </label>

          <label class="form-field">
            <span>메모</span>
            <input type="text" id="itemMemo" maxlength="180" placeholder="추가 메모가 있으면 적어주세요" />
          </label>

          <div class="editor-form__grid">
            <label class="form-field">
              <span>수량</span>
              <input type="text" id="itemQty" maxlength="40" placeholder="예: 1, 2벌" />
            </label>

            <label class="form-field">
              <span>태그</span>
              <input type="text" id="itemTag" maxlength="40" placeholder="예: 기내용" />
            </label>
          </div>

          <label class="check-row">
            <input type="checkbox" id="itemChecked" />
            <span>이미 챙긴 항목으로 표시</span>
          </label>

          <div class="editor-form__actions">
            <button type="button" class="btn btn--danger" data-action="delete-item" id="deleteItemButton" hidden>삭제</button>
            <button type="button" class="btn" data-action="close-editor">취소</button>
            <button type="submit" class="btn btn--primary">저장</button>
          </div>
        </form>
      </aside>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
